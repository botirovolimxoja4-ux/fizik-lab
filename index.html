<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>FizikLab — fizika kalkulyatori</title>
<meta name="description" content="Aniq hisoblaydigan fizika kalkulyatori: yechimlar, misollar, formulalar, grafiklar.">
<meta name="theme-color" content="#0b1020">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./favicon.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FizikLab">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg2:#0e1426; --surface:rgba(22,29,51,.72); --surface2:rgba(30,39,66,.55);
  --line:rgba(120,140,190,.16); --line2:rgba(120,140,190,.28);
  --txt:#eef1f8; --muted:#8b96b3; --muted2:#6c7796;
  --cyan:#38e1ff; --cyan-d:#1aa6c4; --amber:#ffb454; --green:#54e6a8; --red:#ff7a8a;
  --display:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  --nav-h:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); color:var(--txt); line-height:1.5;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(56,225,255,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(255,180,84,.07), transparent 55%),
    linear-gradient(180deg,var(--bg2),var(--bg) 40%);
  background-attachment:fixed; min-height:100dvh;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}

/* header */
header{
  position:sticky;top:0;z-index:30;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  display:flex;align-items:center;gap:11px;
  background:linear-gradient(180deg,rgba(10,14,26,.92),rgba(10,14,26,.55));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
}
.logo{width:34px;height:34px;flex:0 0 auto;filter:drop-shadow(0 0 8px rgba(56,225,255,.35))}
.brand{display:flex;flex-direction:column;line-height:1.05}
.brand b{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:.2px}
.brand b i{color:var(--cyan);font-style:normal}
.brand span{font-size:11px;color:var(--muted)}
.hdr-actions{margin-left:auto;display:flex;gap:8px}
.icon-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  height:34px;padding:0 11px;border-radius:11px;font-size:12.5px;font-weight:600;
  background:var(--surface2);border:1px solid var(--line2);color:var(--txt);
}
.icon-btn.accent{background:linear-gradient(135deg,var(--cyan),var(--cyan-d));color:#04222b;border:none}
.hidden{display:none!important}

/* main + views */
main{max-width:560px;margin:0 auto;padding:16px 14px 8px}
.view{display:none;animation:fade .28s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-lead{color:var(--muted);font-size:13.5px;margin:2px 2px 16px}

/* topic / tool grid */
.topic-grid,.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.topic-card,.tool-card{
  text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:18px;
  padding:16px 14px;display:flex;flex-direction:column;gap:3px;transition:.18s;
  backdrop-filter:blur(8px);
}
.topic-card:active,.tool-card:active{transform:scale(.97);border-color:var(--cyan)}
.t-icon{font-size:26px}
.t-name{font-family:var(--display);font-weight:600;font-size:15px;margin-top:4px}
.t-desc{font-size:11.5px;color:var(--muted)}
.tool-grid{grid-template-columns:1fr}
.tool-card{flex-direction:row;align-items:center;gap:14px}
.tool-card .t-icon{font-size:24px}
.tool-card .t-name{margin-top:0}

/* crumb / back */
.crumb{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.crumb-title{font-family:var(--display);font-weight:600;font-size:16px}
.back-btn{
  background:var(--surface2);border:1px solid var(--line2);border-radius:10px;
  padding:7px 12px;font-size:13px;font-weight:600;color:var(--cyan)
}
.back-btn:active{transform:scale(.96)}

/* formula list */
.formula-list{display:flex;flex-direction:column;gap:9px}
.formula-pick{
  text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:14px 15px;display:flex;flex-direction:column;gap:5px;transition:.16s
}
.formula-pick:active{transform:scale(.98);border-color:var(--cyan)}
.fp-title{font-weight:600;font-size:14.5px}
.fp-eq{font-family:var(--mono);font-size:13px;color:var(--cyan)}

/* solver */
.solver{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:18px 16px}
.solver-eq{
  font-family:var(--mono);font-size:20px;font-weight:600;text-align:center;color:var(--cyan);
  padding:14px;background:rgba(56,225,255,.07);border:1px solid rgba(56,225,255,.18);
  border-radius:14px;margin-bottom:16px;letter-spacing:.5px
}
.field-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.chip{
  padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;
  background:var(--surface2);border:1px solid var(--line2);color:var(--muted)
}
.chip.on{background:linear-gradient(135deg,var(--cyan),var(--cyan-d));color:#04222b;border-color:transparent}
.inputs{display:flex;flex-direction:column;gap:11px}
.in-row{display:flex;flex-direction:column;gap:6px}
.in-name{font-size:13px;color:var(--muted)}
.in-name i{color:var(--muted2);font-style:normal;font-size:12px}
.in-field{
  width:100%;background:rgba(10,14,26,.6);border:1.5px solid var(--line2);border-radius:12px;
  padding:13px 14px;color:var(--txt);font-size:16px;font-family:var(--mono);transition:.15s;outline:none
}
.in-field:focus{border-color:var(--cyan);background:rgba(56,225,255,.06)}

/* result */
.result{margin-top:18px}
.res-card{
  width:100%;text-align:left;border-radius:16px;padding:15px 16px;
  background:linear-gradient(135deg,rgba(56,225,255,.14),rgba(255,180,84,.07));
  border:1px solid rgba(56,225,255,.32);display:flex;flex-direction:column;gap:8px;transition:.2s
}
.res-card:active{transform:scale(.99)}
.res-top{display:flex;justify-content:space-between;align-items:center}
.res-label{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--cyan);font-weight:700}
.res-hint{font-size:11.5px;color:var(--muted)}
.res-card.open .res-hint::after{content:''}
.res-value{font-family:var(--mono);font-size:30px;font-weight:600;color:#fff;letter-spacing:.5px}
.res-unit{font-size:16px;color:var(--amber);margin-left:8px;font-weight:500}
.res-bad{color:var(--red);font-size:13.5px;padding:12px;background:rgba(255,122,138,.08);border:1px solid rgba(255,122,138,.25);border-radius:12px}
.res-steps,.ex-steps{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.res-steps.open,.ex-steps.open{max-height:900px}

/* steps */
.steps{margin-top:12px;display:flex;flex-direction:column;gap:1px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.step{display:flex;gap:10px;padding:11px 13px;background:var(--surface2);align-items:baseline}
.step:nth-child(even){background:rgba(16,22,40,.5)}
.step-l{flex:0 0 38%;font-size:12px;color:var(--muted);font-weight:600}
.step-c{flex:1;font-family:var(--mono);font-size:13.5px;color:var(--txt)}
.step:last-child .step-c{color:var(--green);font-weight:600}

/* filters */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 14px;margin:0 -2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter{
  flex:0 0 auto;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;white-space:nowrap;
  background:var(--surface2);border:1px solid var(--line2);color:var(--muted)
}
.filter.on{background:var(--txt);color:#0a0e1a;border-color:transparent}

/* examples */
.ex-list{display:flex;flex-direction:column;gap:12px}
.ex-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 15px}
.ex-tag{font-size:11.5px;color:var(--cyan);font-weight:600;margin-bottom:8px}
.ex-q{font-size:14.5px;line-height:1.55;margin-bottom:13px}
.ex-ans{
  width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:13px 14px;border-radius:13px;background:rgba(84,230,168,.1);border:1px solid rgba(84,230,168,.28);
  font-size:14px;transition:.18s
}
.ex-ans b{color:var(--green)}
.ex-ans:active{transform:scale(.99)}
.ex-hint{font-size:11.5px;color:var(--muted);flex:0 0 auto}

/* theory */
.th-list{display:flex;flex-direction:column;gap:11px}
.th-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px}
.th-title{font-family:var(--display);font-weight:600;font-size:15px;margin-bottom:8px}
.th-eq{font-family:var(--mono);font-size:17px;color:var(--cyan);background:rgba(56,225,255,.07);border-radius:10px;padding:10px 12px;text-align:center;margin-bottom:11px}
.th-vars{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:4px}
.th-vars li{font-size:13px;color:var(--muted)}
.th-vars b{color:var(--txt);font-weight:600}

/* graph */
.graph-box{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px}
.g-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.graph-canvas{width:100%;display:block;border-radius:10px}
.g-caption{text-align:center;font-family:var(--mono);font-size:13px;color:var(--amber);margin-top:10px}

/* converter */
.tool-h{font-family:var(--display);font-size:19px;margin:6px 2px 14px;font-weight:600}
.conv-wrap{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;display:flex;flex-direction:column;gap:10px}
.conv-row{display:flex;gap:9px}
.conv-input{flex:1;background:rgba(10,14,26,.6);border:1.5px solid var(--line2);border-radius:12px;padding:13px;color:var(--txt);font-family:var(--mono);font-size:17px;outline:none;min-width:0}
.conv-input:focus{border-color:var(--cyan)}
.conv-input.out{color:var(--cyan);font-weight:600}
.conv-sel{flex:0 0 38%;background:rgba(10,14,26,.6);border:1.5px solid var(--line2);border-radius:12px;padding:13px 8px;color:var(--txt);font-size:14px;outline:none}
.conv-eq{text-align:center;font-size:20px;color:var(--muted);font-family:var(--mono)}

/* constants */
.const-list{display:flex;flex-direction:column;gap:8px}
.const-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px 14px}
.c-sym{font-family:var(--mono);font-size:18px;color:var(--cyan);font-weight:600;flex:0 0 46px}
.c-mid{flex:1;font-size:13px}
.c-mid b{font-weight:500}
.c-val{font-family:var(--mono);font-size:12.5px;color:var(--amber);text-align:right}

/* photos */
.muted-note{font-size:13px;color:var(--muted);margin:0 2px 14px;line-height:1.5}
.empty-note{text-align:center;color:var(--muted2);font-size:13.5px;padding:30px 0}
.photo-add{margin-bottom:16px}
.btn-primary{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--cyan-d));color:#04222b;font-weight:700;font-size:15px}
.btn-primary:active{transform:scale(.99)}
.btn-ghost{width:100%;padding:13px;border-radius:14px;background:var(--surface2);border:1px solid var(--line2);color:var(--txt);font-weight:600}
.ph-preview{margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:10px}
.ph-preview img{width:100%;border-radius:11px;max-height:300px;object-fit:contain;background:#000}
.ph-preview textarea{width:100%;min-height:70px;background:rgba(10,14,26,.6);border:1.5px solid var(--line2);border-radius:11px;padding:11px;color:var(--txt);font-size:14px;resize:vertical;outline:none}
.ph-actions{display:flex;gap:9px}
.ph-actions .btn-primary,.ph-actions .btn-ghost{padding:11px}
.ph-list{display:flex;flex-direction:column;gap:12px}
.ph-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:12px;overflow:hidden}
.ph-card img{width:100%;border-radius:11px;max-height:340px;object-fit:contain;background:#000}
.ph-note-txt{font-size:13.5px;color:var(--txt);margin-top:10px;white-space:pre-wrap;line-height:1.55}
.ph-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11.5px;color:var(--muted2)}
.ph-del{color:var(--red);font-size:12.5px;font-weight:600;padding:5px 9px;border-radius:8px;background:rgba(255,122,138,.1)}

/* bottom nav */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  display:flex;justify-content:space-around;align-items:stretch;
  background:linear-gradient(0deg,rgba(8,11,20,.97),rgba(8,11,20,.86));
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid var(--line)
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted2);font-size:10.5px;font-weight:600;position:relative;transition:.15s}
.nav-btn .ni{font-size:21px;line-height:1;transition:.2s}
.nav-btn.on{color:var(--cyan)}
.nav-btn.on .ni{transform:translateY(-2px) scale(1.08)}
.nav-btn.on::before{content:'';position:absolute;top:7px;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,rgba(56,225,255,.22),transparent 70%)}
/* AI yechuvchi */
.ai-box{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-input{width:100%;min-height:90px;background:rgba(10,14,26,.6);border:1.5px solid var(--line2);border-radius:13px;padding:13px;color:var(--txt);font-size:15px;line-height:1.5;resize:vertical;outline:none;font-family:var(--body)}
.ai-input:focus{border-color:var(--cyan)}
.ai-prev{position:relative}
.ai-prev img{width:100%;border-radius:12px;max-height:280px;object-fit:contain;background:#000}
.ai-prev-x{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(10,14,26,.82);border:1px solid var(--line2);color:#fff;font-size:18px;line-height:1}
.ai-btn-row{display:flex;gap:10px}
.ai-up-row{display:flex;gap:10px}
.ai-up-row .btn-ghost{flex:1;font-size:13px;padding:13px 6px}
.ai-btn-row .btn-ghost{flex:1.3}.ai-btn-row .btn-primary{flex:1}
.ai-out{margin-top:14px}
.ai-loading{display:flex;align-items:center;gap:10px;justify-content:center;padding:24px;color:var(--muted);font-size:14px}
.spin{display:inline-block;width:17px;height:17px;border:2px solid rgba(56,225,255,.28);border-top-color:var(--cyan);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ai-ans{font-size:23px!important;word-break:break-word;line-height:1.3}
.ai-note{margin-top:10px;font-size:12.5px;color:var(--muted);background:rgba(255,180,84,.08);border:1px solid rgba(255,180,84,.2);border-radius:10px;padding:10px 12px;line-height:1.5}
.ai-hist-h{margin:22px 2px 12px;font-family:var(--display);font-weight:600;font-size:15px;color:var(--muted)}
.ai-hist{display:flex;flex-direction:column;gap:12px}
.hist-img{width:100%;border-radius:11px;max-height:200px;object-fit:contain;background:#000;margin-bottom:10px}
/* Fizik kalkulyator */
.calc-hint{font-size:11.5px;color:var(--muted);margin:0 2px 10px;line-height:1.5}
.calc{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:14px}
.calc-disp{background:rgba(10,14,26,.7);border:1px solid var(--line2);border-radius:13px;padding:12px 14px;margin-bottom:12px;min-height:74px;display:flex;flex-direction:column;justify-content:center;gap:4px;overflow:hidden}
.calc-expr{font-family:var(--mono);font-size:18px;color:var(--txt);word-break:break-all;min-height:22px}
.calc-res{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--cyan);text-align:right;word-break:break-all}
.calc-res.err{color:var(--red);font-size:14px;font-weight:500}
.calc-pad{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ckey{padding:14px 0;border-radius:13px;background:var(--surface2);border:1px solid var(--line2);color:var(--txt);font-size:16px;font-weight:600;font-family:var(--mono);transition:.1s;min-height:48px}
.ckey:active{transform:scale(.94);background:rgba(56,225,255,.12)}
.ckey.num{background:rgba(30,39,66,.85)}
.ckey.op{color:var(--amber)}
.ckey.fnk{color:var(--red);font-size:14px}
.ckey.eq{background:linear-gradient(135deg,var(--cyan),var(--cyan-d));color:#04222b;border-color:transparent;font-weight:700}
</style>
<script src="https://js.puter.com/v2/"></script>

<body>
<header>
  <svg class="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g stroke="#38e1ff" stroke-width="2.4">
      <ellipse cx="24" cy="24" rx="20" ry="8"/>
      <ellipse cx="24" cy="24" rx="20" ry="8" transform="rotate(60 24 24)"/>
      <ellipse cx="24" cy="24" rx="20" ry="8" transform="rotate(120 24 24)"/>
    </g>
    <circle cx="24" cy="24" r="4.6" fill="#ffb454"/>
  </svg>
  <div class="brand"><b>Fizik<i>Lab</i></b><span>aniq fizika kalkulyatori</span></div>
  <div class="hdr-actions">
    <button class="icon-btn accent hidden" id="install-btn">⤓ O‘rnatish</button>
    <button class="icon-btn" id="share-btn">↗ Ulashish</button>
  </div>
</header>

<main>
  <section class="view active" id="view-yechuvchi"></section>
  <section class="view" id="view-hisob"></section>
  <section class="view" id="view-misol"></section>
  <section class="view" id="view-formula"></section>
  <section class="view" id="view-asbob"></section>
</main>

<nav>
  <button class="nav-btn on" data-v="yechuvchi"><span class="ni">✨</span>Yechuvchi</button>
  <button class="nav-btn" data-v="hisob"><span class="ni">🧮</span>Hisob</button>
  <button class="nav-btn" data-v="misol"><span class="ni">📚</span>Misollar</button>
  <button class="nav-btn" data-v="formula"><span class="ni">📐</span>Formula</button>
  <button class="nav-btn" data-v="asbob"><span class="ni">🛠️</span>Asbob</button>
</nav>

<script>
// ---------- helpers ----------
const PI = Math.PI;
function g(x){ // format a given input value cleanly
  if (x === '' || x == null || isNaN(x)) return '?';
  let n = Number(x);
  if (Number.isInteger(n)) return String(n);
  return String(Number(n.toPrecision(6)));
}
function fmt(x){ // format a result
  if (x == null || !isFinite(x)) return '—';
  if (x === 0) return '0';
  const a = Math.abs(x);
  if (a >= 1e6 || a < 1e-4){
    let e = x.toExponential(3);
    let m = e.match(/^(-?\d\.\d+)e([+-]\d+)$/);
    if (m){ let exp = parseInt(m[2],10); return m[1].replace(/\.?0+$/,'') + '·10' + sup(exp); }
    return e;
  }
  return String(Number(x.toPrecision(5)));
}
function sup(n){ const map={'-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'}; return String(n).split('').map(c=>map[c]||c).join(''); }
function S(...rows){ return rows.map(r=>({l:r[0], c:r[1]})); }

function tempConvert(val, from, to){
  let c; // to Celsius
  if (from==='°C') c=val; else if (from==='°F') c=(val-32)*5/9; else c=val-273.15;
  if (to==='°C') return c; if (to==='°F') return c*9/5+32; return c+273.15;
}

function doSolve(f){

    vals[inp.dataset.k]=n;
  });
  if(!ok){ res.classList.add('hidden'); return; }
  let out;
  try{ out=f.solve[curTarget](vals); }catch(e){ ok=false; }

}

function drawGraph(){
  const cv=$('#gcanvas'); if(!cv) return;
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||320, H=260;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const vals={}; (gHost||document).querySelectorAll('.g-inputs .in-field').forEach(i=>vals[i.dataset.k]=Number(i.value.replace(',','.'))||0);
  const pad={l:42,r:14,t:14,b:30};
  const px=W-pad.l-pad.r, py=H-pad.t-pad.b;
  let f, tmax=Math.max(vals.tmax||10,0.1), ymax, ylabel, xlabel='t (s)', color='#38e1ff', caption;
  if(gType==='st'){ f=t=>vals.v0*t+vals.a*t*t/2; ylabel='s (m)'; caption='s(t) = v₀·t + a·t²/2'; }
  else if(gType==='vt'){ f=t=>vals.v0+vals.a*t; ylabel='v (m/s)'; caption='v(t) = v₀ + a·t'; }
  else { f=t=>vals.A*Math.sin(2*Math.PI*t/(vals.T||1)); ylabel='x (m)'; caption='x(t) = A·sin(2π·t/T)'; }
  // sample
  const N=240, xs=[],ys=[]; let ymin=0; ymax=0;
  for(let i=0;i<=N;i++){const t=tmax*i/N; const y=f(t); xs.push(t); ys.push(y); if(y>ymax)ymax=y; if(y<ymin)ymin=y;}
  if(gType==='osc'){ymax=Math.max(ymax,Math.abs(ymin),1e-6); ymin=-ymax;}
  if(ymax===ymin){ymax=ymin+1;}
  const X=t=>pad.l+px*(t/tmax);
  const Y=y=>pad.t+py*(1-(y-ymin)/(ymax-ymin));
  // axes grid
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.fillStyle='#7d88a6'; ctx.font='11px system-ui';
  for(let i=0;i<=5;i++){const gy=pad.t+py*i/5; ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
    const yv=ymax-(ymax-ymin)*i/5; ctx.fillText(fmt(yv),4,gy+3);}
  for(let i=0;i<=5;i++){const gx=pad.l+px*i/5; ctx.beginPath();ctx.moveTo(gx,pad.t);ctx.lineTo(gx,H-pad.b);ctx.stroke();
    ctx.fillText(fmt(tmax*i/5),gx-6,H-pad.b+16);}
  // zero axis
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.beginPath();ctx.moveTo(pad.l,Y(0));ctx.lineTo(W-pad.r,Y(0));ctx.stroke();
  // curve
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.beginPath();
  xs.forEach((t,i)=>{const X2=X(t),Y2=Y(ys[i]); i?ctx.lineTo(X2,Y2):ctx.moveTo(X2,Y2);});
  ctx.stroke();
  // glow fill
  ctx.lineTo(X(tmax),Y(Math.max(0,ymin))); ctx.lineTo(X(0),Y(Math.max(0,ymin)));
  const grd=ctx.createLinearGradient(0,pad.t,0,H-pad.b); grd.addColorStop(0,'rgba(56,225,255,0.18)'); grd.addColorStop(1,'rgba(56,225,255,0)');
  ctx.fillStyle=grd; ctx.fill();
  ctx.fillStyle='#9aa6c4'; ctx.font='12px system-ui'; ctx.fillText(ylabel,pad.l,11);
  $('#gcap').textContent=caption;
}

let aiImage=null, aiBusy=false;
function buildUserText(t){ return t && t.trim() ? t.trim() : 'Quyidagi rasmda fizika masalasi bor. Uni yech.'; }
function processImage(file, cb){
  const rd=new FileReader();
  rd.onerror=()=>cb(null);
  rd.onload=()=>{
    const raw=rd.result;
    const img=new Image();
    img.onload=()=>{
      try{
        let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        const max=1280, sc=Math.min(1, max/Math.max(w,h||1));
        const cw=Math.max(1,Math.round(w*sc)), ch=Math.max(1,Math.round(h*sc));
        const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
        cv.getContext('2d').drawImage(img,0,0,cw,ch);
        const url=cv.toDataURL('image/jpeg',0.85);
        const m=url.match(/^data:(.*?);base64,(.*)$/);
        cb({url, mediaType:m?m[1]:'image/jpeg', data:m?m[2]:''});
      }catch(_){ const m=raw.match(/^data:(.*?);base64,(.*)$/); cb({url:raw, mediaType:m?m[1]:'image/jpeg', data:m?m[2]:''}); }
    };
    img.onerror=()=>{ const m=raw.match(/^data:(.*?);base64,(.*)$/); cb({url:raw, mediaType:m?m[1]:'image/jpeg', data:m?m[2]:''}); };
    img.src=raw;
  };
  rd.readAsDataURL(file);
}
function loadHist(){try{return JSON.parse(localStorage.getItem('fl_hist')||'[]');}catch(e){return[];}}
function saveHist(a){
  const arr=a.slice(0,20);
  try{ localStorage.setItem('fl_hist',JSON.stringify(arr)); }
  catch(e){ try{ localStorage.setItem('fl_hist',JSON.stringify(arr.map(h=>({...h,img:null})))); }catch(_){} }
}
function parseSolution(data){
  if(data && typeof data==='object' && data.answer && Array.isArray(data.steps)) return data;
  let txt='';
  if(typeof data==='string') txt=data;
  else if(data && data.content) (data.content||[]).forEach(b=>{if(b.type==='text')txt+=b.text;});
  txt=txt.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```\s*$/,'').trim();
  const a=txt.indexOf('{'), b=txt.lastIndexOf('}');
  if(a>=0&&b>a) txt=txt.slice(a,b+1);
  return JSON.parse(txt);
}
function puterText(r){
  if(!r) return '';
  if(typeof r==='string') return r;
  if(r.message){ const c=r.message.content; if(typeof c==='string')return c; if(Array.isArray(c))return c.map(p=>(p&&p.text)||'').join(''); }
  if(typeof r.text==='string') return r.text;
  if(Array.isArray(r.content)) return r.content.map(p=>(p&&p.text)||'').join('');
  if(r.content && typeof r.content==='string') return r.content;
  return String(r);
}
async function solveProblem(payload){
  // 1) Netlify server funksiyasi (Gemini — deploy uchun, bepul kalit serverda)
  try{
    const r=await fetch('/.netlify/functions/solve',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({text:payload.text,image:payload.image})});
    if(r.status!==404){
      const d=await r.json().catch(()=>null);
      if(r.ok && d && (d.answer||Array.isArray(d.steps))) return parseSolution(d);
    }
  }catch(e){}
  // 2) Claude.ai ichida ochilganda — Claude'ning o'z AI'si (kalitsiz, test uchun)
  try{
    const content=[];
    if(payload.image && payload.image.data) content.push({type:'image',source:{type:'base64',media_type:payload.image.mediaType,data:payload.image.data}});
    content.push({type:'text',text:buildUserText(payload.text)});
    const r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,system:AI_SYSTEM,messages:[{role:'user',content}]})});
    if(r2.ok) return parseSolution(await r2.json());
  }catch(e){}
  // 3) Puter.js (kalitsiz, brauzerda — deploy qilingan saytda zaxira)
  try{
    if(typeof puter!=='undefined' && puter.ai && puter.ai.chat){
      const prompt = AI_SYSTEM + '\n\n=== MASALA ===\n' + buildUserText(payload.text);
      const resp = payload.imageURL
        ? await puter.ai.chat(prompt, payload.imageURL, {model:'google/gemini-2.5-flash'})
        : await puter.ai.chat(prompt, {model:'google/gemini-2.5-flash'});
      return parseSolution(puterText(resp));
    }
  }catch(e){}
  throw new Error('NOSERVER');
}

async function runSolve(){
  if(aiBusy) return;
  const text=$('#ai-text').value.trim();
  if(!text && !aiImage){ alert('Masala yozing yoki rasm biriktiring.'); return; }
  aiBusy=true;
  const out=$('#ai-out'); out.innerHTML=`<div class="ai-loading"><span class="spin"></span> Yechilmoqda…</div>`;
  const sb=$('#ai-solve'); if(sb)sb.disabled=true;
  try{
    const sol=await solveProblem({text, image:aiImage?{mediaType:aiImage.mediaType,data:aiImage.data}:null, imageURL:aiImage?aiImage.url:null});
    if(!sol || !sol.answer) throw new Error('PARSE');
    out.innerHTML=`
      <button class="res-card" onclick="this.nextElementSibling.classList.toggle('open');this.classList.toggle('open')">
        <span class="res-top"><span class="res-label">${(sol.topic||'Javob').replace(/</g,'&lt;')}</span><span class="res-hint">yechimni ko‘rish ▾</span></span>
        <span class="res-value ai-ans">${(sol.answer||'').replace(/</g,'&lt;')}</span>
      </button>
      <div class="res-steps">${stepsHTML(sol.steps||[])}${sol.note?`<div class="ai-note">${(sol.note||'').replace(/</g,'&lt;')}</div>`:''}</div>`;
    const h=loadHist(); h.unshift({q:text, img:aiImage?aiImage.url:null, answer:sol.answer, steps:sol.steps||[], t:Date.now()}); saveHist(h);
  }catch(e){
    const noServer = e.message==='NOSERVER' || /Failed to fetch|NetworkError|load failed|CORS/i.test(e.message||'');
    out.innerHTML=`<div class="res-bad"><b>Hozircha yechib bo‘lmadi.</b><br>${noServer
      ?'AI yechuvchi internet bilan ishlaydi. Internetingizni tekshiring. Agar saytda ishlamasa, README’dagi bepul Gemini kalitini sozlang. Internetsiz “Hisob” bo‘limidan foydalaning — u aniq hisoblaydi.'
      :'Xato: '+(e.message||'nomaʼlum')}</div>`;
  }
  aiBusy=false; const sb2=$('#ai-solve'); if(sb2)sb2.disabled=false;
}

// ===================== FIZIK KALKULYATOR =====================
function evalExpr(raw, deg){
  deg = deg!==false;
  let s = raw
    .replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-')
    .replace(/√/g,' sqrt ').replace(/∛/g,' cbrt ')
    .replace(/π/g,' pi ');
  const toks=[]; let i=0;
  const fns=['sqrt','cbrt','sin','cos','tan','asin','acos','atan','log','ln','exp','abs'];
  while(i<s.length){
    const c=s[i];
    if(c===' '){i++;continue;}
    if(/[0-9.]/.test(c)){ let j=i+1; while(j<s.length&&/[0-9.]/.test(s[j]))j++; toks.push({t:'num',v:parseFloat(s.slice(i,j))}); i=j; continue; }
    if(/[a-z]/i.test(c)){ let j=i+1; while(j<s.length&&/[a-z]/i.test(s[j]))j++; const w=s.slice(i,j).toLowerCase();
      if(w==='pi'){toks.push({t:'num',v:Math.PI});} else if(w==='e'){toks.push({t:'num',v:Math.E});}
      else if(fns.includes(w)){toks.push({t:'fn',v:w});} else throw new Error('Nomaʼlum: '+w);
      i=j; continue; }
    if('+-*/^'.includes(c)){toks.push({t:'op',v:c});i++;continue;}
    if(c==='('){toks.push({t:'lp'});i++;continue;}
    if(c===')'){toks.push({t:'rp'});i++;continue;}
    if(c==='%'){toks.push({t:'pct'});i++;continue;}
    throw new Error('Belgi: '+c);
  }
  const out=[];
  for(let k=0;k<toks.length;k++){
    const a=out[out.length-1], b=toks[k];
    if(a){ const aEnd=a.t==='num'||a.t==='rp'||a.t==='pct'; const bStart=b.t==='num'||b.t==='lp'||b.t==='fn'; if(aEnd&&bStart) out.push({t:'op',v:'*'}); }
    out.push(b);
  }
  let p=0; const peek=()=>out[p], next=()=>out[p++];
  function parseExpr(){ let v=parseTerm(); while(peek()&&peek().t==='op'&&(peek().v==='+'||peek().v==='-')){const o=next().v; const r=parseTerm(); v=o==='+'?v+r:v-r;} return v; }
  function parseTerm(){ let v=parseUnary(); while(peek()&&peek().t==='op'&&(peek().v==='*'||peek().v==='/')){const o=next().v; const r=parseUnary(); v=o==='*'?v*r:v/r;} return v; }
  function parseUnary(){ if(peek()&&peek().t==='op'&&peek().v==='-'){next();return -parseUnary();} if(peek()&&peek().t==='op'&&peek().v==='+'){next();return parseUnary();} return parsePower(); }
  function parsePower(){ let base=parsePostfix(); if(peek()&&peek().t==='op'&&peek().v==='^'){next(); const e=parseUnary(); return Math.pow(base,e);} return base; }
  function parsePostfix(){ let v=parsePrimary(); while(peek()&&peek().t==='pct'){next(); v=v/100;} return v; }
  function parsePrimary(){
    const tk=peek(); if(!tk) throw new Error('tugallanmagan');
    if(tk.t==='num'){next();return tk.v;}
    if(tk.t==='fn'){next();
      if(peek()&&peek().t==='lp'){ next(); const arg=parseExpr(); if(!peek()||peek().t!=='rp')throw new Error(') kerak'); next(); return applyFn(tk.v,arg); }
      return applyFn(tk.v, parsePrimary());
    }
    if(tk.t==='lp'){next(); const v=parseExpr(); if(!peek()||peek().t!=='rp')throw new Error(') kerak'); next(); return v;}
    throw new Error('kutilmagan');
  }
  function applyFn(f,x){ const D=Math.PI/180;
    switch(f){ case 'sqrt':return Math.sqrt(x); case 'cbrt':return Math.cbrt(x);
      case 'sin':return Math.sin(deg?x*D:x); case 'cos':return Math.cos(deg?x*D:x); case 'tan':return Math.tan(deg?x*D:x);
      case 'asin':return deg?Math.asin(x)/D:Math.asin(x); case 'acos':return deg?Math.acos(x)/D:Math.acos(x); case 'atan':return deg?Math.atan(x)/D:Math.atan(x);
      case 'log':return Math.log10(x); case 'ln':return Math.log(x); case 'exp':return Math.exp(x); case 'abs':return Math.abs(x);
    } throw new Error('fn'); }
  const res=parseExpr();
  if(p<out.length) throw new Error('ortiqcha belgi');
  if(!isFinite(res)) throw new Error('aniqlanmagan');
  return res;
}
function fmtCalc(x){ if(!isFinite(x))return 'xato'; if(Math.abs(x)<1e-12)x=0; return Number(x.toPrecision(12)).toString(); }
function balanceParens(s){ let o=0; for(const c of s){ if(c==='(')o++; else if(c===')')o--; } return s + (o>0?')'.repeat(o):''); }
let calcTokens=[], calcDeg=true;
const CALC_KEYS=[
  [['DEG','deg'],['(','('],[')',')'],['⌫','back'],['C','clear']],
  [['sin','sin('],['cos','cos('],['tan','tan('],['ln','ln('],['log','log(']],
  [['√','√('],['∛','∛('],['xⁿ','^'],['π','π'],['e','e']],
  [['7','7'],['8','8'],['9','9'],['÷','÷'],['x²','^2']],
  [['4','4'],['5','5'],['6','6'],['×','×'],['ⁿ√','^(1/']],
  [['1','1'],['2','2'],['3','3'],['−','−'],['×10ⁿ','×10^']],
  [['0','0'],['.','.'],['%','%'],['+','+'],['=','eq']],
];
function buildCalc(host){
  host.innerHTML='';
  host.appendChild(el('div','ai-hist-h','Fizik kalkulyator'));
  host.appendChild(el('p','calc-hint','Sonlar, ildiz (√, ∛), daraja (xⁿ), ×10ⁿ, π, sin/cos… — qo‘lda yozib hisoblang. <b>ⁿ√</b>: avval sonni yozing, so‘ng ⁿ√ va darajani kiriting, ) bilan yoping.'));
  const card=el('div','calc');
  const disp=el('div','calc-disp');
  disp.innerHTML=`<div class="calc-expr" id="calc-expr"></div><div class="calc-res" id="calc-res">0</div>`;
  card.appendChild(disp);
  const pad=el('div','calc-pad');
  CALC_KEYS.forEach(row=>row.forEach(([label,tok])=>{
    const b=el('button','ckey'+(/^[0-9.]$/.test(label)?' num':'')+(label==='='?' eq':'')+(['÷','×','−','+'].includes(label)?' op':'')+(['back','clear'].includes(tok)?' fnk':''),label);
    if(label==='=') b.classList.add('eq');
    b.onclick=()=>calcPress(tok);
    pad.appendChild(b);
  }));
  card.appendChild(pad);
  host.appendChild(card);
  calcRefresh();
}
function calcRefresh(){
  const e=document.getElementById('calc-expr'), r=document.getElementById('calc-res');
  if(!e||!r) return;
  e.textContent=calcTokens.join('');
  const degBtn=[...document.querySelectorAll('.ckey')].find(b=>b.textContent==='DEG'||b.textContent==='RAD');
  if(degBtn) degBtn.textContent=calcDeg?'DEG':'RAD';
  if(!calcTokens.length){ r.textContent='0'; r.classList.remove('err'); return; }
  try{ const val=evalExpr(balanceParens(calcTokens.join('')),calcDeg); r.textContent='= '+fmtCalc(val); r.classList.remove('err'); }
  catch(_){ r.textContent='…'; r.classList.remove('err'); }
}
function calcPress(tok){
  if(tok==='clear'){ calcTokens=[]; calcRefresh(); return; }
  if(tok==='back'){ calcTokens.pop(); calcRefresh(); return; }
  if(tok==='deg'){ calcDeg=!calcDeg; calcRefresh(); return; }
  if(tok==='eq'){
    try{ const val=evalExpr(balanceParens(calcTokens.join('')),calcDeg); calcTokens=[fmtCalc(val)]; calcRefresh(); }
    catch(_){ const r=document.getElementById('calc-res'); if(r){r.textContent='Xato — ifodani tekshiring'; r.classList.add('err');} }
    return;
  }
  calcTokens.push(tok); calcRefresh();
}
